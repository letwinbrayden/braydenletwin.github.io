<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor | Brayden Letwin</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="description" content="Protected editor page for Brayden Letwin." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <nav class="site-nav" aria-label="Primary">
      <a class="home-link" href="index.html">Brayden Letwin</a>
      <div class="nav-links">
        <a class="button secondary" href="index.html">Home</a>
        <a class="button" href="blog.html">Blog</a>
      </div>
    </nav>

    <section class="card section page-intro">
      <div class="kicker">Editor</div>
      <h1 style="margin-bottom: 12px;">Protected blog editor</h1>
      <p class="muted" style="margin: 0;">
        This page is intentionally not linked publicly and only renders for signed-in admins.
      </p>
    </section>

    <section class="card section" id="admin-status" aria-live="polite">
      <div class="empty-state">Checking access…</div>
    </section>

    <section class="card section" id="admin-app" style="display:none;">
      <div class="comments-header">
        <div>
          <h2 style="margin-bottom: 8px;">Blog posts</h2>
          <p class="muted" id="admin-user-info" style="margin:0;"></p>
        </div>
        <div class="buttons" style="margin-top:0;">
          <button class="secondary" id="new-post-button" type="button">New post</button>
          <button class="secondary" id="admin-sign-out" type="button">Sign out</button>
        </div>
      </div>

      <div id="admin-notices"></div>

      <div class="admin-layout">
        <section class="auth-box">
          <h3 style="margin-bottom:14px;">Posts</h3>
          <div id="admin-post-list" class="grid"></div>
        </section>

        <section class="auth-box">
          <h3 id="editor-heading">Create post</h3>
          <form id="post-editor-form">
            <input type="hidden" id="post-id" />
            <div class="form-row">
              <label for="post-title-input">Title</label>
              <input id="post-title-input" name="title" type="text" maxlength="200" required />
            </div>
            <div class="form-row">
              <label for="post-slug-input">Slug</label>
              <input id="post-slug-input" name="slug" type="text" maxlength="120" required />
            </div>
            <div class="form-row">
              <label for="post-date-input">Published date</label>
              <input id="post-date-input" name="publishedAt" type="date" />
            </div>
            <div class="form-row">
              <label for="post-readtime-input">Read time</label>
              <input id="post-readtime-input" name="readTime" type="text" maxlength="40" placeholder="e.g. 4 min read" />
            </div>
            <div class="form-row">
              <label for="post-excerpt-input">Excerpt</label>
              <textarea id="post-excerpt-input" name="excerpt" maxlength="400" required></textarea>
            </div>
            <div class="form-row">
              <label for="post-content-input">Content HTML</label>
              <textarea id="post-content-input" name="contentHtml" class="editor-textarea" required></textarea>
            </div>
            <div class="form-row checkbox-row">
              <label class="checkbox-label">
                <input id="post-published-input" name="isPublished" type="checkbox" />
                Publish this post
              </label>
            </div>
            <div class="buttons">
              <button class="primary" type="submit">Save post</button>
              <button class="secondary" id="reset-editor-button" type="button">Clear form</button>
              <a class="button" id="preview-link" href="blog.html">Open blog</a>
            </div>
          </form>
        </section>
      </div>
    </section>

    <div class="footer">Private editor page</div>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
