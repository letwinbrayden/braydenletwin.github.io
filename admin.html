<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Brayden Letwin</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta http-equiv="refresh" content="0; url=publications-admin.html" />
  <style>
    :root {
      --bg: #f8f8f6;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #5f6775;
      --line: #d9dde3;
      --accent: #4b2e83;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", Times, serif;
    }

    .card {
      max-width: 560px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 { margin: 0 0 12px; font-size: 1.8rem; color: var(--accent); }
    p { margin: 0 0 14px; line-height: 1.7; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Admin</h1>
    <p>The blog has been removed. The admin area now lives in the publications editor.</p>
    <p><a href="publications-admin.html">Open the publications editor</a></p>
  </main>
</body>
</html>
