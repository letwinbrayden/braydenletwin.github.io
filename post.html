<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post · Brayden Letwin</title>
  <meta name="description" content="Blog post by Brayden Letwin." />
  <link rel="stylesheet" href="site.css" />
</head>
<body>
  <main class="page">
    <nav class="card topbar" aria-label="Primary">
      <a class="brand" href="index.html">Brayden Letwin</a>
      <div class="nav">
        <a href="index.html">Home</a>
        <a href="publications.html">Publications</a>
        <a class="active" href="blog.html">Blog</a>
        <a href="admin.html">Admin</a>
      </div>
    </nav>

    <div class="split">
      <section class="stack">
        <article id="post-article" class="card post-article">
          <div class="empty-state">Loading post…</div>
        </article>

        <section class="card section">
          <h2>Comments</h2>
          <div id="comment-status" class="status hidden"></div>
          <div id="comment-composer" style="margin-bottom: 18px;"></div>
          <div id="comment-list" class="comment-list"></div>
        </section>
      </section>

      <aside class="stack">
        <section class="card panel">
          <h2 style="margin-top: 0;">Account</h2>
          <div id="auth-status" class="status hidden"></div>
          <div id="auth-widget"></div>
        </section>

        <section class="card panel">
          <h2 style="margin-top: 0;">Back</h2>
          <div class="inline-actions">
            <a class="button" href="blog.html">All posts</a>
          </div>
        </section>

        <section class="card panel">
          <h2 style="margin-top: 0;">Setup note</h2>
          <p class="muted small">
            This page reads the post slug from the URL, for example <span class="code">post.html?slug=my-first-post</span>.
          </p>
          <div id="post-status" class="status hidden"></div>
        </section>
      </aside>
    </div>

    <div class="footer">
      Brayden Letwin
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script type="module" src="js/postPage.js"></script>
</body>
</html>
