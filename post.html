<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post | Brayden Letwin</title>
  <meta
    name="description"
    content="Blog post and comments."
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <nav class="site-nav" aria-label="Primary">
      <a class="home-link" href="index.html">Brayden Letwin</a>
      <div class="nav-links">
        <a class="button secondary" href="blog.html">All posts</a>
        <a class="button" href="publications.html">Publications</a>
        <a class="button primary" href="CV.pdf" target="_blank" rel="noopener noreferrer">Curriculum Vitae</a>
      </div>
    </nav>

    <div class="two-column">
      <article class="card" id="post-shell">
        <header class="post-header">
          <div class="kicker">Blog post</div>
          <h1 class="post-title" id="post-title">Loading…</h1>
          <ul class="inline-list" id="post-meta"></ul>
        </header>
        <div class="post-body" id="post-body"></div>
      </article>

      <aside class="card sidebar-card">
        <div class="comments-header">
          <h2 style="margin-bottom: 0;">Comments</h2>
          <a href="blog.html">Back to blog</a>
        </div>

        <div id="auth-notices"></div>
        <div id="auth-panel" aria-live="polite"></div>

        <div style="height: 18px;"></div>

        <div id="comment-form-wrap"></div>

        <div style="height: 18px;"></div>

        <div id="comments-wrap" aria-live="polite"></div>
      </aside>
    </div>
  </main>

  <script type="module" src="post.js"></script>
</body>
</html>
