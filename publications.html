<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Publications | Brayden Letwin</title>
<script src="publications-mathjax-config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml.js"></script>
<style>
    :root {
      --bg: #f7f4ee;
      --bg-2: #f2ece1;
      --card: rgba(255, 255, 255, 0.96);
      --text: #1d2430;
      --muted: #636b79;
      --line: #ddd4c5;
      --line-strong: #cbbda8;
      --accent: #4b2e83;
      --accent-soft: rgba(75, 46, 131, 0.08);
      --shadow: 0 6px 18px rgba(31, 23, 53, 0.05);
      --max-width: 860px;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(75, 46, 131, 0.045), transparent 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, Georgia, "Times New Roman", serif;
      line-height: 1.58;
      font-size: 16.5px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: clamp(16px, 3.2vw, 30px) clamp(14px, 2.8vw, 22px) 44px;
    }

    .hero {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(75, 46, 131, 0.12);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 24px);
      margin-bottom: 18px;
      backdrop-filter: blur(2px);
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.015em;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.85rem, 3.8vw, 2.55rem);
      line-height: 1.08;
      color: var(--accent);
      font-weight: 700;
    }

    .intro {
      margin: 0;
      max-width: 42rem;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 14px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(75, 46, 131, 0.14);
      background: var(--accent-soft);
      font-size: 0.9rem;
    }

    .back-link:hover {
      text-decoration: none;
      background: rgba(75, 46, 131, 0.12);
    }

    .listing {
      padding: 0;
    }

    .section-heading {
      margin: 0 2px 14px;
    }

    .section-heading h2 {
      margin: 0 0 5px;
      font-size: 1.18rem;
      color: var(--accent);
      font-weight: 700;
    }

    .section-heading p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .pub-list {
      display: grid;
      gap: 12px;
    }

    .pub {
      position: relative;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 18px 14px 20px;
      overflow: hidden;
    }

    .pub::before {
      content: "";
      position: absolute;
      left: 0;
      top: 14px;
      bottom: 14px;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(75, 46, 131, 0.95), rgba(75, 46, 131, 0.35));
    }

    .pub-title {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.28;
      font-weight: 700;
      text-wrap: balance;
      padding-right: 4px;
    }

    .pub-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .pub-meta:empty {
      display: none;
    }

    .pub-meta > * {
      display: inline-flex;
      align-items: center;
      min-height: 1.2em;
    }

    .pub-meta > * {
    display: inline-block;
    min-height: 1.2em;
    vertical-align: baseline;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(75, 46, 131, 0.14);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.77rem;
      line-height: 1;
      white-space: nowrap;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .link-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(133, 117, 77, 0.18);
      background: #fcfbf8;
      color: var(--text);
      font-size: 0.88rem;
    }

    .link-pill:hover {
      text-decoration: none;
      border-color: rgba(75, 46, 131, 0.24);
      background: #f7f4ed;
    }

    .abstract {
      margin-top: 12px;
      border-top: 1px solid rgba(221, 212, 197, 0.9);
      padding-top: 11px;
    }

    .abstract summary {
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.93rem;
      user-select: none;
    }

    .abstract summary::-webkit-details-marker {
      display: none;
    }

    .chevron {
      width: 9px;
      height: 9px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      transition: transform 0.2s ease;
      margin-top: -2px;
      flex: 0 0 auto;
    }

    .abstract[open] .chevron {
      transform: rotate(225deg);
      margin-top: 3px;
    }

    .abstract-body {
      margin-top: 10px;
      max-width: 66ch;
      color: #404757;
      font-size: 0.95rem;
      background: rgba(252, 251, 248, 0.9);
      border: 1px solid rgba(221, 212, 197, 0.9);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .abstract-body p,
    .abstract-body .abstract-block {
      margin: 0 0 0.8em;
    }

    .abstract-body p:last-child,
    .abstract-body .abstract-block:last-child {
      margin-bottom: 0;
    }

    .abstract-body mjx-container[display="true"] {
      display: block;
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      margin: 0.8em 0;
      padding-bottom: 0.1em;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 18px;
    }

    @media (max-width: 720px) {
      body {
        font-size: 15.5px;
        line-height: 1.54;
      }

      .page {
        padding: 12px 10px 30px;
      }

      .hero {
        padding: 18px 16px;
        margin-bottom: 16px;
      }

      .pub {
        border-radius: 14px;
        padding: 14px 14px 13px 16px;
      }

      .pub::before {
        top: 12px;
        bottom: 12px;
      }

      .pub-title {
        font-size: 1rem;
      }

      .section-heading h2 {
        font-size: 1.08rem;
      }

      .intro,
      .section-heading p,
      .abstract-body,
      .pub-meta {
        font-size: 0.93rem;
      }

      .link-pill,
      .badge,
      .abstract summary,
      .back-link {
        min-height: 38px;
      }

      .abstract-body {
        padding: 11px 12px;
      }
    }
  

    .empty-state {
      padding: 18px 20px;
      border-radius: 14px;
      border: 1px dashed rgba(75, 46, 131, 0.24);
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
    }

    .pub-target {
      border-color: rgba(75, 46, 131, 0.34);
      box-shadow: 0 12px 28px rgba(75, 46, 131, 0.1);
    }
</style>
</head>
<body>
<main class="page">
<section class="hero">
<p class="eyebrow">Brayden Letwin</p>
<h1>Publications &amp; Preprints</h1>
<p class="intro">A selection of published work, current manuscripts, and projects in progress.</p>
<a class="back-link" href="index.html">← Back to homepage</a>
</section>
<section class="listing">
<div class="section-heading">
<h2>Research Papers</h2>
<p>Select a paper to expand its abstract.</p>
</div>
<div aria-live="polite" class="pub-list" id="publications-list"></div>
</section>
<div class="footer" id="publications-last-updated"></div>
</main>
<script src="./publications-page.js" type="module"></script></body>
</html>
